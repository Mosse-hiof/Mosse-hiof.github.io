<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Digitekt</title>
  <meta name="description" content="The page you were looking for doesn't exist." />
  <meta name="robots" content="noindex, follow" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23E07A5F'/><text x='50' y='72' font-size='62' font-weight='700' text-anchor='middle' fill='%23FFFAF5' font-family='sans-serif'>D</text></svg>" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=general-sans@300,400,500,600&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#FFFAF5',
            ink: '#2A2520',
            stone: '#8A8178',
            coral: '#E07A5F',
            'coral-dark': '#C4654D',
            peach: '#FBD8C4',
            apricot: '#F5C5AF',
          },
          fontFamily: {
            clash: ['"Clash Display"', 'sans-serif'],
            sans: ['"General Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    body { background: #FFFAF5; color: #2A2520; font-family: 'General Sans', sans-serif; overflow: hidden; }
    *:focus-visible { outline: 2px solid #E07A5F; outline-offset: 3px; border-radius: 4px; }

    .hero-mesh {
      position: absolute; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
      background:
        radial-gradient(800px 600px at 18% 30%, rgba(251,216,196,0.85), transparent 60%),
        radial-gradient(700px 500px at 82% 70%, rgba(245,197,175,0.75), transparent 60%),
        radial-gradient(500px 400px at 50% 100%, rgba(224,122,95,0.25), transparent 65%),
        #FFFAF5;
      animation: meshDrift 24s ease-in-out infinite alternate;
      filter: blur(40px);
    }
    @keyframes meshDrift {
      0%   { transform: translate3d(0,0,0) scale(1); }
      50%  { transform: translate3d(-2%, 1%, 0) scale(1.04); }
      100% { transform: translate3d(2%, -1%, 0) scale(1.02); }
    }

    .cta {
      display: inline-block;
      padding: 1.1rem 2.5rem;
      background: #E07A5F;
      color: #fff;
      font-family: 'Clash Display', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 12px;
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }
    .cta:hover {
      background: #C4654D;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(224,122,95,0.3);
    }
  </style>
</head>

<body class="relative min-h-screen">
  <div class="hero-mesh"></div>

  <nav class="fixed top-0 left-0 w-full z-50 px-6 md:px-12 py-5 flex items-center justify-between bg-cream/80 backdrop-blur-lg">
    <a href="/" class="font-clash font-bold text-xl tracking-tight flex items-center gap-2">
      <span class="inline-flex items-center justify-center w-8 h-8 bg-coral text-white rounded-lg text-sm font-bold tracking-tight">D</span>
      DIGITEKT<span class="text-coral">.</span>
    </a>
    <a href="/" class="text-sm font-medium tracking-widest uppercase hover:text-coral transition-colors">&larr; Back to Home</a>
  </nav>

  <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-6 md:px-12 text-center">
    <p class="text-coral text-sm tracking-[0.3em] uppercase mb-6">/// Error 404</p>
    <h1 class="font-clash font-bold text-[18vw] md:text-[12rem] leading-none tracking-tighter mb-4">404</h1>
    <h2 class="font-clash font-semibold text-2xl md:text-4xl mb-5 max-w-2xl">This page took a detour.</h2>
    <p class="text-stone text-base md:text-lg max-w-xl mb-10 leading-relaxed">
      The page you're looking for doesn't exist, has moved, or never did. Let's get you back on track.
    </p>
    <a href="/" class="cta">Back to Home</a>
  </main>
</body>
</html>
